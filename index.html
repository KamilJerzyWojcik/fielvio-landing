document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lock; width:100%; aspect-ratio:1/1; object-fit:cover;\">\n          <div style=\"padding:14px 10px; text-align:center; font-size:14px; font-weight:600;\">Kominy<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#202A35; border:1px solid #2D3742; border-radius:16px; overflow:hidden;\">\n          <img src=\"0fc35559-facb-4d4a-903d-4c41560c014c\" alt=\"Kocioł gazowy\" style=\"display:block; width:100%; aspect-ratio:1/1; object-fit:cover;\">\n          <div style=\"padding:14px 10px; text-align:center; font-size:14px; font-weight:600;\">Kotły gazowe<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#202A35; border:1px solid #2D3742; border-radius:16px; overflow:hidden;\">\n          <img src=\"f85e893b-3b92-4726-8875-acc197bc7f2b\" alt=\"Pompa ciepła\" style=\"display:block; width:100%; aspect-ratio:1/1; object-fit:cover;\">\n          <div style=\"padding:14px 10px; text-align:center; font-size:14px; font-weight:600;\">Pompy ciepła<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#202A35; border:1px solid #2D3742; border-radius:16px; overflow:hidden;\">\n          <img src=\"d8bbb05a-a6c6-4930-8843-70b5a147b028\" alt=\"Klimatyzacja\" style=\"display:block; width:100%; aspect-ratio:1/1; object-fit:cover;\">\n          <div style=\"padding:14px 10px; text-align:center; font-size:14px; font-weight:600;\">Klimatyzacja<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#202A35; border:1px solid #2D3742; border-radius:16px; overflow:hidden;\">\n          <img src=\"57898828-098f-4b34-87d0-a52604a05bee\" alt=\"Panele PV\" style=\"display:block; width:100%; aspect-ratio:1/1; object-fit:cover;\">\n          <div style=\"padding:14px 10px; text-align:center; font-size:14px; font-weight:600;\">PV<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#202A35; border:1px solid #2D3742; border-radius:16px; overflow:hidden;\">\n          <img src=\"72881126-fef5-4e59-b4e8-641618cac313\" alt=\"Magazyn energii\" style=\"display:block; width:100%; aspect-ratio:1/1; object-fit:cover;\">\n          <div style=\"padding:14px 10px; text-align:center; font-size:14px; font-weight:600;\">Magazyny energii<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:28px auto 0; max-width:70ch; text-align:center; font-size:14px; line-height:1.55; color:#A7B0B8;\">Każda branża ma inny cykl serwisu. Mechanizm jest ten sam: urządzenie, termin, dokumentacja, opieka, powrót klienta.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CZĘSTE OBAWY (FAQ) ============ -->\n  <section id=\"obawy\" style=\"background:#18212B; border-bottom:1px solid #2D3742;\">\n    <div class=\"fv-wrap\" style=\"max-width:1000px; margin:0 auto; padding:80px 32px;\">\n      <div style=\"text-align:center; max-width:54ch; margin:0 auto 44px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#A7B0B8; letter-spacing:.08em; margin-bottom:14px;\">// CZĘSTE OBAWY<\u002Fdiv>\n        <h2 class=\"fv-h2\" style=\"margin:0; font-size:36px; font-weight:700; letter-spacing:-0.02em; line-height:1.12;\">Pytania, które pewnie teraz masz.<\u002Fh2>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; gap:12px; max-width:820px; margin:0 auto;\">\n        <details style=\"background:#202A35; border:1px solid #2D3742; border-radius:14px; overflow:hidden;\">\n          <summary style=\"cursor:pointer; padding:20px 22px; display:flex; align-items:center; gap:12px;\">\n            <span style=\"width:26px; height:26px; border-radius:8px; background:rgba(30,136,229,.14); color:#5CA8F0; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:700; font-size:14px; font-family:'JetBrains Mono',monospace;\">?<\u002Fspan>\n            <span style=\"flex:1; min-width:0; font-size:16px; font-weight:600; line-height:1.35; color:#F4F7F8;\">„Klient nie będzie chciał płacić abonamentu.”<\u002Fspan>\n            <svg class=\"fv-faq-chev\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#A7B0B8\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0; transition:transform .2s;\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fsummary>\n          <p style=\"margin:0; padding:0 22px 20px 60px; font-size:14.5px; line-height:1.55; color:#A7B0B8;\">Klient i tak płaci za obowiązkowy przegląd. Abonament to ten sam przegląd rozłożony na miesiące — plus stała opieka i pilnowane terminy między przeglądami. Nie płaci więcej, płaci mądrzej. A cenę pakietu ustalasz sam.<\u002Fp>\n        <\u002Fdetails>\n        <details style=\"background:#202A35; border:1px solid #2D3742; border-radius:14px; overflow:hidden;\">\n          <summary style=\"cursor:pointer; padding:20px 22px; display:flex; align-items:center; gap:12px;\">\n            <span style=\"width:26px; height:26px; border-radius:8px; background:rgba(30,136,229,.14); color:#5CA8F0; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:700; font-size:14px; font-family:'JetBrains Mono',monospace;\">?<\u002Fspan>\n            <span style=\"flex:1; min-width:0; font-size:16px; font-weight:600; line-height:1.35; color:#F4F7F8;\">„Nie mam czasu wdrażać kolejnego systemu.”<\u002Fspan>\n            <svg class=\"fv-faq-chev\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#A7B0B8\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0; transition:transform .2s;\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fsummary>\n          <p style=\"margin:0; padding:0 22px 20px 60px; font-size:14.5px; line-height:1.55; color:#A7B0B8;\">Nie wdrażasz nic osobno. Urządzenie dodajesz przy montażu albo przeglądzie, który i tak wykonujesz. Zaczynasz od kilku sztuk, nie od całej bazy naraz.<\u002Fp>\n        <\u002Fdetails>\n        <details style=\"background:#202A35; border:1px solid #2D3742; border-radius:14px; overflow:hidden;\">\n          <summary style=\"cursor:pointer; padding:20px 22px; display:flex; align-items:center; gap:12px;\">\n            <span style=\"width:26px; height:26px; border-radius:8px; background:rgba(30,136,229,.14); color:#5CA8F0; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:700; font-size:14px; font-family:'JetBrains Mono',monospace;\">?<\u002Fspan>\n            <span style=\"flex:1; min-width:0; font-size:16px; font-weight:600; line-height:1.35; color:#F4F7F8;\">„Nie chcę oddać moich klientów ani danych.”<\u002Fspan>\n            <svg class=\"fv-faq-chev\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#A7B0B8\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0; transition:transform .2s;\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fsummary>\n          <p style=\"margin:0; padding:0 22px 20px 60px; font-size:14.5px; line-height:1.55; color:#A7B0B8;\">Baza jest Twoja. Fielvio to narzędzie, nie pośrednik — nie sprzedajemy leadów i nie wchodzimy między Ciebie a klienta. Nikt nie przejmie Twojej relacji.<\u002Fp>\n        <\u002Fdetails>\n        <details style=\"background:#202A35; border:1px solid #2D3742; border-radius:14px; overflow:hidden;\">\n          <summary style=\"cursor:pointer; padding:20px 22px; display:flex; align-items:center; gap:12px;\">\n            <span style=\"width:26px; height:26px; border-radius:8px; background:rgba(30,136,229,.14); color:#5CA8F0; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:700; font-size:14px; font-family:'JetBrains Mono',monospace;\">?<\u002Fspan>\n            <span style=\"flex:1; min-width:0; font-size:16px; font-weight:600; line-height:1.35; color:#F4F7F8;\">„Dopiero zaczynam — nie mam jeszcze bazy urządzeń.”<\u002Fspan>\n            <svg class=\"fv-faq-chev\" width=\"18\" height=\"18\" viewBox=\
